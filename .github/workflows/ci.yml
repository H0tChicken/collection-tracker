name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      # prisma validate / build read env("DATABASE_URL") from the schema; a
      # placeholder is enough since neither connects to the database.
      - run: npx prisma validate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
      - run: npm run typecheck
      - run: npm run test
      - name: Next build
        run: npm run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
