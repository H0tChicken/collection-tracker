name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Run JS-based actions under Node 24 (GitHub is deprecating the Node 20
  # runtime some actions still declare).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      # prisma validate / build read env("DATABASE_URL") from the schema; a
      # placeholder is enough since neither connects to the database.
      - run: npx prisma validate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
      - run: npm run typecheck
      - run: npm run test
      # Rebuild the catalog and fail if committed catalog/dist is out of date
      # with catalog/sources (keeps compiled output honest).
      - name: Build catalog
        run: npm run catalog:build
      - name: Verify catalog/dist is up to date
        run: git diff --exit-code -- catalog/dist
      - name: Next build
        run: npm run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
